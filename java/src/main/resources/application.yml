spring:
  application:
    name: music-admin
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/music?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: true
    show-sql: false
  flyway:
    enabled: false
    locations: classpath:db/migration
  sql:
    init:
      mode: always
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: ${PORT:8080}

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.security: warn

security:
  jwt:
    secret: ${JWT_SECRET:change-me-very-secret-key-32-bytes-min-change}
    expiration: 86400000
